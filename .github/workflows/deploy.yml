name: Deploy Expo VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR="$HOME/hipster_ia_mobile_app"
            SESSION="dev"
            LOG_FILE="$APP_DIR/expo.log"

            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main

            node -v
            npm -v

            npm ci

            if tmux has-session -t "$SESSION" 2>/dev/null; then
              tmux kill-session -t "$SESSION"
              sleep 2
            fi

            rm -rf .expo
            : > "$LOG_FILE"

            tmux new-session -d -s "$SESSION" \
              "cd '$APP_DIR' && EXPO_TUNNEL_SUBDOMAIN=hipsteria npx expo start -c --tunnel >> '$LOG_FILE' 2>&1"

            sleep 12

            echo "==== tmux sessions ===="
            tmux ls || true

            echo "==== Expo log (last 100 lines) ===="
            tail -n 100 "$LOG_FILE" || true