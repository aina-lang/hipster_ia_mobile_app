name: Deploy Expo App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR="$HOME/hipster_ia_mobile_app"
            APP_NAME="hipsteria"

            cd "$APP_DIR"

            echo "==== Pull latest code ===="
            git fetch origin
            git reset --hard origin/main

            echo "==== Versions ===="
            node -v
            npm -v

            echo "==== Install deps ===="
            npm ci

            echo "==== Clean Expo cache ===="
            rm -rf .expo

            echo "==== Start or restart PM2 process ===="
            if pm2 describe "$APP_NAME" > /dev/null 2>&1; then
              pm2 delete "$APP_NAME"
            fi

            EXPO_TUNNEL_SUBDOMAIN=hipsteria pm2 start "npx expo start -c --tunnel" \
              --name "$APP_NAME" \
              --cwd "$APP_DIR"

            echo "==== Save PM2 process list ===="
            pm2 save

            echo "==== PM2 status ===="
            pm2 ls

            echo "==== PM2 logs (last 100 lines) ===="
            pm2 logs "$APP_NAME" --lines 100 --nostream